apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: nginx-vs
  namespace: test-app
spec:
  hosts:
  - "www.jacky3.com"
  gateways:
  - nginx-gateway
  http:
  - match:
    - uri:
        prefix: /
    route:
    - destination:
        host: nginx-service.test-app.svc.cluster.local
        port:
          number: 80
  tls:
  - match:
    - port: 443
      sniHosts:
      - www.jacky3.com
    route:
    - destination:
        host: nginx-service.test-app.svc.cluster.local
        port:
          number: 80